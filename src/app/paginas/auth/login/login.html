<main class="login-container">
  <section class="form-section">
    <header class="brand-header">
      </header>

    <div class="chef-animated-icon">
       <i class="fa-solid fa-utensils"></i> 
    </div>

    <div class="auth-box">
      <p class="auth-subtitle">
        Bem-vindo de volta! <br>Entre para acessar suas receitas favoritas
        <br>Não tem uma conta? <a routerLink="/cadastro">Cadastre-se</a>
      </p>

      <form (ngSubmit)="onLogin()">
        <div class="input-group">
          <i class="fa-regular fa-user input-icon"></i>
          <input type="email" name="email" [(ngModel)]="loginData.email" placeholder="seu@email.com" required>
        </div>

        <div class="input-group">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" name="password" [(ngModel)]="loginData.password" placeholder="••••••••••••" required>
        </div>

        <div class="form-actions">
          <label class="remember-me">
            <input type="checkbox" name="rememberMe" [(ngModel)]="loginData.rememberMe">
            <span class="checkmark"></span>
            Lembrar de mim
          </label>
        </div>

    <button type="submit" class="btn-submit">Entrar</button>
      </form>
    </div>
  </section>

  <section class="image-section">
    <div class="menu-icon-wrapper">
      <div class="hamburger-menu"></div>
    </div>
  </section>
</main>
