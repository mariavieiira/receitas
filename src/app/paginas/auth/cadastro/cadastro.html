<main class="login-container">
  <section class="image-section">
    <div class="menu-icon-wrapper">
      <div class="hamburger-menu"></div>
    </div>
  </section>
  <section class="form-section">
    <header class="brand-header">
    </header>

    <div class="chef-animated-icon">
       <i class="fa-solid fa-utensils"></i> 
    </div>

    <div class="auth-box">
      <p class="auth-subtitle">
        Crie sua conta e comece <br> a salvar suas receitas favoritas!
        <br>Já tem uma conta? <a href="/login">Entrar</a>
      </p>

      <form (ngSubmit)="onRegister()">
        <div class="input-group">
          <i class="fa-regular fa-user input-icon"></i>
          <input type="text" name="name" [(ngModel)]="registerData.name" placeholder="Seu nome completo" required>
        </div>

        <div class="input-group">
          <i class="fa-regular fa-envelope input-icon"></i>
          <input type="email" name="email" [(ngModel)]="registerData.email" placeholder="seu@email.com" required>
        </div>

        <div class="input-group">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" name="password" [(ngModel)]="registerData.password" placeholder="Crie uma senha" required>
        </div>

        <div class="input-group">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" name="confirmPassword" [(ngModel)]="registerData.confirmPassword" placeholder="Confirme sua senha" required>
        </div>

        <button type="submit" class="btn-submit">Cadastrar</button>
      </form>
    </div>
  </section>

  
</main>
