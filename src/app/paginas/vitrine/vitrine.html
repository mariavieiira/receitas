<main class="container">
    
    <!-- BANNER HERO DA SEÇÃO -->
    <section class="receitas-banner animar-subir">
      <span class="receitas-banner-tag"><i class="fas fa-utensils"></i> Receitas Selecionadas</span>
      <h1 class="receitas-banner-titulo">Cozinhar é a arte<br>de criar memórias</h1>
      <p class="receitas-banner-sub">
        Encontre receitas práticas e use sua criatividade para criar e publicar suas próprias receitas
      </p>
    </section>

    <!-- DASHBOARD DE MÉTRICAS -->
    <section class="dashboard">
      <div class="dash-card animar-subir delay-1">
        <i class="fas fa-book-open dash-card-icon"></i>
        <h2 class="dash-title">Total de Receitas</h2>
        <p class="dash-number">04</p>
      </div>
      <div class="dash-card animar-subir delay-2">
        <i class="fas fa-clock dash-card-icon"></i>
        <h2 class="dash-title">Tempo Médio</h2>
        <p class="dash-number">35<span class="dash-unit">min</span></p>
      </div>
      <div class="dash-card animar-subir delay-3">
        <i class="fas fa-tags dash-card-icon"></i>
        <h2 class="dash-title">Categorias Ativas</h2>
        <p class="dash-number">04</p>
      </div>
    </section>

    <hr class="divider">

    <!-- BARRA DE BUSCA E FILTROS RÁPIDOS -->
    <div class="receitas-controles animar-fade">
      <div class="busca-container">
        <span class="busca-icone"><i class="fas fa-search"></i></span>
        <input class="busca-input" type="text" placeholder="Buscar por pratos, ingredientes..." />
      </div>
      <div class="filtros-lista">
        <button class="filtro-btn ativo">Todos</button>
        <button class="filtro-btn">Sobremesa</button>
        <button class="filtro-btn">Massa</button>
        <button class="filtro-btn">Prato Principal</button>
        <button class="filtro-btn">Salada</button>
      </div>
    </div>

    <!-- SEÇÃO DA GRADE DE RECEITAS -->
    <section class="receitas-section">
      <p class="receitas-grid-titulo">4 receitas encontradas</p>

      <div class="receitas-grid">
        
        @for (item of receita(); track $index) {

        <app-receita [data]="item"></app-receita>
        }

      </div>
    </section>

    <!-- PAGINAÇÃO -->
    <div class="paginacao">
      <button class="paginacao-btn"><i class="fas fa-chevron-left"></i></button>
      <button class="paginacao-btn ativo">1</button>
      <button class="paginacao-btn">2</button>
      <button class="paginacao-btn">3</button>
      <button class="paginacao-btn"><i class="fas fa-chevron-right"></i></button>
    </div>

  </main>
